services:
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: ai-blog-backend
    ports:
      - "5000:5000"
    env_file:
      - ./back-end/.env
    networks:
      - blog-network


  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    container_name: ai-blog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:

